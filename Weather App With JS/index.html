<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App With JS</title>
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://kit.fontawesome.com/ead04d1c2b.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="container">
      <div class="header">
        <input type="text" placeholder="Enter the city" class="search" />
        <button class="fa-solid fa-magnifying-glass" id="searchBtn"></button>
      </div>

      <div class="location-not-found">
        <h1>Sorry , Location not found!!!</h1>
        <img src="Images/error.png">
      </div>
      <div class="body">
        <img src="Images/cloud.jpg" alt="Weather" class="WhetherImg" />

        <div class="weather-box">
          <p class="temp">0<sup>°C</sup></p>
          <p class="desc">Light Rain</p>
        </div>

        <div class="weather-details">
          <div class="humidity">
            <i class="fa-sharp fa-solid fa-droplet"></i>
            <div class="text">
              <span id="humidity">45%</span>
              <p>Humidity</p>
            </div>
          </div>
        

       
          <div class="wind">
            <i class="fa-solid fa-wind"></i>
            <div class="text">
              <span id="wind-speed">12Km/h</span>
              <p>Wind Speed</p>
            </div>
          </div>
        
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
